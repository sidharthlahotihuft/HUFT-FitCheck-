function overlapPct(breed, prod){ const lo=Math.max(breed[0],prod[0]), hi=Math.min(breed[1],prod[1]); return hi<=lo?0:(hi-lo)/(breed[1]-breed[0]); }
function gradeOf(p){ return p>=0.9?"full":p>=0.55?"good":p>0?"partial":"none"; }
const GRADE = {
  full:{label:"Full fit",color:"#00854D",bg:"#E5F9F0"},

  partial:{label:"Partial",color:"#B47500",bg:"#FEF1E5"},
  none:{label:"No fit",color:"#9699A6",bg:"#EAECF2"},
};
function widthAdvice(nMax){ return nMax<=30?"1–1.5 cm webbing":nMax<=45?"1.5–2.5 cm webbing":nMax<=60?"2.5–3.8 cm webbing":"3.8–5 cm webbing"; }
function pullHardware(p){ return p>=5?"Load-rated metal hardware, bar-tack + box-X stitching, ≥3.8 cm web":p>=4?"Metal D-rings, bar-tack stitching, ≥2.5 cm web":p>=3?"Quality acetal or metal hardware, reinforced joins":"Standard hardware acceptable"; }

function TapeBar({breedRange,prodRange,domain}){
  const [dLo,dHi]=domain, span=dHi-dLo, pct=v=>Math.max(0,Math.min(100,((v-dLo)/span)*100));
  const bLo=pct(breedRange[0]),bHi=pct(breedRange[1]),pLo=pct(prodRange[0]),pHi=pct(prodRange[1]);
  const oLo=Math.max(bLo,pLo),oHi=Math.min(bHi,pHi);
  const hasOverlap=oHi>oLo;
  return (
    <div>

          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={verdict==="bad"?"What's wrong? e.g. 'Fit-lab measured Indie neck 38–52, ours reads low'":"Optional comment…"}
            rows={2} style={{width:"100%",boxSizing:"border-box",borderRadius:7,border:"1px solid #C3C6D4",padding:8,fontSize:13,fontFamily:"inherit",resize:"vertical"}}/>
          <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
            <input value={author} onChange={e=>setAuthor(e.target.value)} placeholder="Your name" style={{flex:1,minWidth:120,borderRadius:7,border:"1px solid #C3C6D4",padding:"6px 8px",fontSize:12.5,fontFamily:"inherit"}}/>
            <button onClick={submit} style={{background:"#FF6D1F",color:"#fff",border:"none",borderRadius:7,padding:"6px 16px",fontSize:12.5,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Submit</button>
          </div>
        </div>
      )}
      {mine.length>0 && (
        <div style={{marginTop:6,display:"grid",gap:4}}>
          {mine.slice(-3).reverse().map(f=>(
            <div key={f.id} style={{fontSize:12,color:"#40434E",background:f.verdict==="good"?"#E5F9F0":"#FCE9EC",borderRadius:6,padding:"5px 9px"}}>
              <b style={{color:f.verdict==="good"?"#00A25B":"#E2445C"}}>{f.verdict==="good"?"✓":"✗"} {f.field}</b> {f.text && `— ${f.text}`} <span style={{color:"#9699A6"}}>· {f.author} · {f.ts.slice(0,10)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------- Ask HUFT Fit: rule-based answer engine over the data ---------- */
const CITY_ZONE = {delhi:"n",gurgaon:"n",gurugram:"n",noida:"n",ncr:"n",jaipur:"n",lucknow:"n",chandigarh:"n","tri-city":"n",north:"n",
  mumbai:"w",pune:"w",ahmedabad:"w",surat:"w",gujarat:"w",west:"w",
  bangalore:"s",bengaluru:"s",chennai:"s",hyderabad:"s",kochi:"s",south:"s",
  kolkata:"e",guwahati:"e",east:"e"};
const ALIASES = {lab:"Labrador Retriever",labrador:"Labrador Retriever",golden:"Golden Retriever",gsd:"German Shepherd","german shepherd":"German Shepherd",alsatian:"German Shepherd",
  indie:"Indian Pariah (Indie)",pariah:"Indian Pariah (Indie)","desi dog":"Indian Pariah (Indie)",pom:"Pomeranian",frenchie:"French Bulldog",
  "shih tzu":"Shih Tzu",shihtzu:"Shih Tzu",husky:"Siberian Husky",rott:"Rottweiler",rottweiler:"Rottweiler",doberman:"Doberman",dobermann:"Doberman",
  mudhol:"Mudhol / Caravan Hound",caravan:"Mudhol / Caravan Hound",dane:"Great Dane",saint:"Saint Bernard","st bernard":"Saint Bernard",
  pitbull:"Amstaff / Pit-type","pit bull":"Amstaff / Pit-type",amstaff:"Amstaff / Pit-type",gaddi:"Himalayan Sheepdog (Gaddi)","bully kutta":"Bully Kutta (Indian Mastiff)",
  dachshund:"Dachshund (Standard)",sausage:"Dachshund (Standard)",corgi:"Pembroke Corgi",bulldog:"English Bulldog",spitz:"Indian Spitz",poodle:"Standard Poodle",
  malamute:"Alaskan Malamute",basset:"Basset Hound","tibetan mastiff":"Tibetan Mastiff",bullmastiff:"Bullmastiff",banjara:"Banjara Hound",vanjari:"Banjara Hound"};

function findBreeds(q, all){
  const found=[]; const ql=" "+q.toLowerCase()+" ";
  const entries=Object.entries(ALIASES).sort((a,z)=>z[0].length-a[0].length);
  for(const [alias,full] of entries){ if(ql.includes(alias)){ const b=all.find(x=>x.name===full); if(b && !found.includes(b)) found.push(b); } }
  for(const b of all){ const parts=[b.name.toLowerCase(),b.name.toLowerCase().split(" (")[0],b.name.toLowerCase().split(" /")[0]];
    if(parts.some(p=>p.length>3 && ql.includes(p)) && !found.includes(b)) found.push(b); }
  return found.slice(0,2);
}
const confNote = t => t==="A"?"confidence A, ±2–3 cm":t==="B"?"confidence B, ±4–6 cm":"confidence C — estimate, validate in fit lab";

/* ---------- product ↔ breed fit engine ---------- */
function bestVariantForBreed(sku, b){
  // apparel is sized by garment back-length, not neck/chest girth
  if(sku.type==="apparel"){
    const bodyLen = (b.care && b.care.bodyLen) || b.height;
    let best=null;
    sku.variants.forEach(v=>{
      const lOv = overlapPct(bodyLen,[v.lengthMin,v.lengthMax]);
      if(!best || lOv>best.score) best={variant:v,score:lOv,cOv:lOv,nOv:1};
    });
    return best;
  }
  // score each variant by combined neck+chest overlap; return best
  let best=null;
  sku.variants.forEach(v=>{
    const nOv = v.neckMin!=null ? overlapPct(b.neck,[v.neckMin,v.neckMax]) : 1;
    const cOv = overlapPct(b.chest,[v.chestMin,v.chestMax]);
    const wOv = (v.weightMin!=null) ? overlapPct(b.weight,[v.weightMin,v.weightMax]) : 1;
    const score = Math.min(cOv, nOv)*0.7 + wOv*0.3;
    if(!best || score>best.score) best={variant:v,score,cOv,nOv};
  });
  return best;
}
function analyzeSku(sku, all){
  const excluded=[], fits={};
  sku.variants.forEach(v=>fits[v.size]=[]);
  all.forEach(b=>{
    const isExcluded = (sku.excludeGroups||[]).includes(b.group) || (sku.excludeGroups||[]).includes(b.hbucket);
    const bv=bestVariantForBreed(sku,b);
    if(isExcluded || !bv || bv.score<0.15){ excluded.push(b); return; }
    fits[bv.variant.size].push({b,score:bv.score});
  });
  Object.keys(fits).forEach(k=>fits[k].sort((x,y)=> (y.b.sales||0)-(x.b.sales||0) || y.score-x.score));
  return {fits,excluded};
}
function skuAnswer(sku, all){
  const {fits,excluded}=analyzeSku(sku,all);
  const sizes=sku.variants.map(v=>v.size);
  const L=[];
  L.push(`**${sku.name}** — ${sizes.length} sizes: ${sizes.join(", ")}`);
  if(sku.notes) L.push(sku.notes);
  L.push(``);
  // excluded summary
  const exNamed=excluded.filter(b=>b.pop>=3 || (b.sales||0)>800).slice(0,6).map(b=>b.name);
  if(sku.type!=="apparel" && (sku.positioning==="functional" || sku.pullFocus))
    L.push(`As a functional${sku.pullFocus?" no-pull":""} product it suits most breeds but is **not ideal for X-Small / toy breeds**${exNamed.length?` — e.g. ${exNamed.join(", ")}`:""}.`);
  L.push(``);
  // per-variant recommendation in the requested style
  sku.variants.forEach(v=>{
    const list=fits[v.size]||[];
    if(!list.length){ L.push(`**${v.size}** — no strong breed match in the database.`); return; }
    const lead=list.slice(0,3).map(x=>x.b.name).join(", ");
    if(sku.type==="apparel"){
      const hi = v.lengthMax>=999?"+":`–${v.lengthMax}`;
      L.push(`**${v.size}** — best for ${lead}${list.length>3?` (+${list.length-3} more)`:""}. Garment back-length ~${v.garmentLength??"—"} cm, fits body length ${v.lengthMin}${hi} cm.`);
      return;
    }
    const wt = v.weightMin!=null?`${v.weightMin}–${v.weightMax} kg`:"—";
    L.push(`**${v.size}** — best for ${lead}${list.length>3?` (+${list.length-3} more)`:""}. Typical dog: ~${wt}, neck ${v.neckMin}–${v.neckMax} cm, chest ${v.chestMin}–${v.chestMax} cm${v.lengthMin!=null?`, back length ${v.lengthMin}–${v.lengthMax} cm`:""}.`);
  });
  L.push(``);
  if(sku.pullFocus) L.push(`Best suited to dogs that pull strongly — front-clip control point and load-rated hardware. For calm toy breeds, a soft back-clip harness is the better call.`);
  L.push(sku.type==="apparel"
    ? `_Body length is estimated for every breed (confidence capped at B) — no breed has been field-measured for length yet. Treat sizing as a starting point, not a guarantee; individual garments vary ±a size._`
    : `_Sizes reflect ${sku.name} variant dimensions; breed girths carry their own A/B/C confidence. Validate borderline dogs in the fit lab._`);
  return L.join("\n");
}

function answerQuestion(q, all){
  const ql=q.toLowerCase();
  const breeds=findBreeds(q, all);
  // product/SKU questions — check catalog names against query
  const skuList = (typeof window!=="undefined" && window.__HUFT_SKUS__) || SEED_SKUS;
  const skuHit = skuList.find(sk=>{ const n=sk.name.toLowerCase(); const key=n.replace("huft ","").replace(" harness","").replace(" collar","").split(" ")[0];
    return ql.includes(n) || ql.includes(key); });
  if(skuHit && (ql.includes("fit")||ql.includes("size")||ql.includes("breed")||ql.includes("which")||ql.includes(skuHit.name.toLowerCase().split(" ")[1]||"xplorer"))) return skuAnswer(skuHit, all);

  const has=w=>ql.includes(w);
  const zoneWord=Object.keys(CITY_ZONE).find(c=>ql.includes(c));
  const nums=(ql.match(/(\d+(?:\.\d+)?)\s*(?:–|-|to)\s*(\d+(?:\.\d+)?)/)||[]).slice(1,3).map(Number);
  const L=[];

  if(breeds.length===2){
    const [a,b]=breeds;
    L.push(`**${a.name} vs ${b.name}**`);
    L.push(`• Neck: ${a.neck[0]}–${a.neck[1]} cm (${a.conf.neck}) vs ${b.neck[0]}–${b.neck[1]} cm (${b.conf.neck})`);
    L.push(`• Chest: ${a.chest[0]}–${a.chest[1]} cm (${a.conf.chest}) vs ${b.chest[0]}–${b.chest[1]} cm (${b.conf.chest})`);
    L.push(`• Weight: ${a.weight[0]}–${a.weight[1]} kg vs ${b.weight[0]}–${b.weight[1]} kg`);
    L.push(`• Pull: ${a.beh.pull}/5 vs ${b.beh.pull}/5 · Escape: ${a.beh.escape}/5 vs ${b.beh.escape}/5 · Heat: ${a.heat}/5 vs ${b.heat}/5`);
    L.push(`• Gear: ${a.name} → ${a.beh.clip}; ${b.name} → ${b.beh.clip}`);
    return L.join("\n");
  }

  if(breeds.length===1){
    const b=breeds[0]; const care=b.care||{};
    if(has("collar")){
      L.push(`**Collar for ${b.name}**`);
      L.push(`• Adult neck girth: ${b.neck[0]}–${b.neck[1]} cm (${confNote(b.conf.neck)}). Add ~2 cm wearing ease.`);
      L.push(`• Webbing: ${widthAdvice(b.neck[1])}.`);
      if(b.flags.includes("brachy")) L.push(`• ⚠ Brachycephalic — collar for ID tags only; walks on a harness.`);
      if(b.flags.includes("slipRisk")) L.push(`• ⚠ Slip risk — head narrower than neck; flat collars slip. Use a martingale.`);
      if(b.beh.pull>=4) L.push(`• Strong puller (${b.beh.pull}/5): ${pullHardware(b.beh.pull)}.`);
      return L.join("\n");
    }
    if(has("harness")){
      L.push(`**Harness for ${b.name}**`);
      L.push(`• Neck: ${b.neck[0]}–${b.neck[1]} cm (${b.conf.neck}) · Chest: ${b.chest[0]}–${b.chest[1]} cm (${confNote(b.conf.chest)}).`);
      L.push(`• Recommended: ${b.beh.clip}. Pull ${b.beh.pull}/5 · escape ${b.beh.escape}/5.`);
      L.push(`• Hardware: ${pullHardware(b.beh.pull)}.`);
      if(b.flags.includes("deepChest")) L.push(`• Deep chest — girth strap migrates; keep it near the elbow with a Y-front.`);
      if(b.flags.includes("coatLoft")) L.push(`• Coat loft adds 2–5 cm apparent girth — size on compressed measurement.`);
      return L.join("\n");
    }
    if(has("pull")||has("leash")){
      L.push(`**${b.name} on leash**`);
      L.push(`• Pull ${b.beh.pull}/5 · energy ${b.beh.energy}/5 · escape ${b.beh.escape}/5.`);
      L.push(`• Gear: ${b.beh.clip}. Hardware: ${pullHardware(b.beh.pull)}.`);
      return L.join("\n");
    }
    if(has("shed")||has("groom")||has("coat")||has("drool")||has("skin")){
      L.push(`**${b.name} — coat & materials**`);
      L.push(`• Coat: ${b.coat}. Shedding ${care.shed}/5 · grooming ${care.groom}/5 · drool ${care.drool}/5 · skin sensitivity ${care.skin}/5.`);
      if(care.skin>=4) L.push(`• Sensitive skin — soft linings, colourfast dyes, no rough edges.`);
      if(care.shed>=4) L.push(`• High shed — avoid velcro and plush linings that trap fur.`);
      if(care.drool>=4) L.push(`• Heavy drool — quick-dry, stain-resistant webbing.`);
      return L.join("\n");
    }
    if(has("heat")||has("summer")||has("hot")||has("climate")){
      L.push(`**${b.name} in Indian heat**`);
      L.push(`• ${heatInfo(b.heat).label}. ${heatInfo(b.heat).tip}`);
      return L.join("\n");
    }
    if(has("region")||has("where")||zoneWord){
      L.push(`**${b.name} — regional demand**`);
      Object.values(REGIONS).forEach(r=>L.push(`• ${r.label} (${r.cities}): ${b.regions[r.key]}/5`));
      return L.join("\n");
    }
    L.push(`**${b.name}** (${b.group}${b.huft?", HUFT priority breed":""})`);
    L.push(`• Neck ${b.neck[0]}–${b.neck[1]} cm (${b.conf.neck}) · Chest ${b.chest[0]}–${b.chest[1]} cm (${b.conf.chest}) · ${b.weight[0]}–${b.weight[1]} kg · ${b.height[0]}–${b.height[1]} cm tall`);
    L.push(`• Behaviour: pull ${b.beh.pull}/5, escape ${b.beh.escape}/5 → ${b.beh.clip}`);
    L.push(`• Heat ${b.heat}/5 · demand N${b.regions.n} W${b.regions.w} S${b.regions.s} E${b.regions.e} · lifespan ${care.life?care.life[0]+"–"+care.life[1]+" yrs":"n/a"}`);
    L.push(`• ${b.notes}`);
    return L.join("\n");
  }

  if(nums.length===2 && (has("neck")||has("chest")||has("collar")||has("harness")||has("fit"))){
    const dim=has("chest")?"chest":"neck";
    const [lo,hi]=nums;
    const fits=all.map(b=>({b,pct:overlapPct(b[dim],[lo,hi])})).filter(x=>x.pct>0).sort((a,z)=>z.pct-a.pct||z.b.pop-a.b.pop);
    const full=fits.filter(x=>x.pct>=0.9), good=fits.filter(x=>x.pct>=0.55&&x.pct<0.9);
    L.push(`**${dim==="neck"?"Neck":"Chest"} range ${lo}–${hi} cm covers:**`);
    L.push(`• Full fit (${full.length}): ${full.slice(0,10).map(x=>x.b.name).join(", ")||"none"}${full.length>10?"…":""}`);
    L.push(`• Good fit (${good.length}): ${good.slice(0,8).map(x=>x.b.name).join(", ")||"none"}${good.length>8?"…":""}`);
    L.push(`Open the Fit checker to see tape-bar overlap per breed and the second dimension.`);
    return L.join("\n");
  }

  if(zoneWord){
    const z=CITY_ZONE[zoneWord]; const r=REGIONS[z];
    const ranked=[...all].filter(b=>b.regions[z]>0).sort((a,x)=>x.regions[z]-a.regions[z]||x.pop-a.pop).slice(0,8);
    L.push(`**Top breeds — ${r.label} zone** (${r.cities}):`);
    ranked.forEach(b=>L.push(`• ${b.name} — ${b.regions[z]}/5 · neck ${b.neck[0]}–${b.neck[1]}, chest ${b.chest[0]}–${b.chest[1]} cm`));
    L.push(`Zone demand is indicative — swap in ERP sales data for ground truth.`);
    return L.join("\n");
  }

  if(has("pull")){ const t=[...all].sort((a,z)=>z.beh.pull-a.beh.pull).slice(0,8);
    return ["**Strongest pullers** (hardware-critical):",...t.map(b=>`• ${b.name} — pull ${b.beh.pull}/5, ${pullHardware(b.beh.pull)}`)].join("\n"); }
  if(has("escape")||has("slip")||has("martingale")){ const t=all.filter(b=>b.beh.escape>=4||b.flags.includes("slipRisk"));
    return ["**Slip-risk / escape-artist breeds** (martingale or 3-strap):",...t.map(b=>`• ${b.name} — escape ${b.beh.escape}/5`)].join("\n"); }
  if(has("heat")||has("summer")){ const t=all.filter(b=>b.heat>=4&&b.pop>=3), w=all.filter(b=>b.heat<=2&&b.pop>=3);
    return [`**Heat-tolerant high-demand breeds:** ${t.map(b=>b.name).join(", ")}`,``,`**Heat-sensitive but popular** (mesh-only builds): ${w.map(b=>b.name).join(", ")}`].join("\n"); }
  if(has("brachy")||has("flat face")){ const t=all.filter(b=>b.flags.includes("brachy"));
    return ["**Brachycephalic breeds** (harness-only for walks):",...t.map(b=>`• ${b.name} — neck ${b.neck[0]}–${b.neck[1]}, chest ${b.chest[0]}–${b.chest[1]} cm`)].join("\n"); }
  if(has("native")||has("indian breed")||has("desi")){ const t=all.filter(b=>b.group==="Native");
    return [`**Native Indian breeds in the database (${t.length}):**`,...t.map(b=>`• ${b.name} — chest ${b.chest[0]}–${b.chest[1]} cm (${b.conf.chest}) · ${b.beh.clip}`)].join("\n"); }
  if(has("popular")||has("top")||has("priority")||has("best")){ const t=[...all].sort((a,z)=>z.pop-a.pop).slice(0,10);
    return ["**Highest India demand:**",...t.map(b=>`• ${b.name} ${"★".repeat(b.pop)}${b.huft?" · HUFT SIX":""}`)].join("\n"); }

  return ["I answer from the breed database. Try:",
    `• "What size collar for a Beagle?"`,
    `• "Harness for an Indie"`,
    `• "Which breeds fit neck 30-45?"`,
    `• "Top breeds in Delhi" or "South zone"`,
    `• "Compare Labrador and Golden"`,
    `• "Strongest pullers" · "Slip-risk breeds" · "Native breeds"`].join("\n");
}

function curatedSkuToProduct(sk){
  // 999 is our "open-ended" sentinel for the top apparel size (82 cm+) — cap it
  // to a realistic ceiling for aggregation/display instead of letting it stand as 999.
  const capLen = m => m>=999 ? 95 : m;
  const agg = sk.type==="apparel"
    ? { neck:null, chest:null, length:[Math.min(...sk.variants.map(v=>v.lengthMin)), Math.max(...sk.variants.map(v=>capLen(v.lengthMax)))] }
    : { neck:[Math.min(...sk.variants.map(v=>v.neckMin)), Math.max(...sk.variants.map(v=>v.neckMax))],
        chest: sk.type==="harness" ? [Math.min(...sk.variants.map(v=>v.chestMin)), Math.max(...sk.variants.map(v=>v.chestMax))] : null,
        length:null };
  return {
    name: sk.name,
    category: sk.type==="apparel" ? "Clothing" : "Collars, Leashes & Harnesses",
    subCategory: sk.type==="apparel" ? "Apparel (auto-sized)" : sk.type==="harness" ? "Harness" : "Collar",
    petType: "Dog",
    collection: null,
    season: null,
    image: null,
    url: sk.url,
    fitMatched: true,
    agg,
    variants: sk.variants.map(v=>({
      size: v.size,
      sku: sk.id+"-"+v.size,
      dimension: sk.type==="apparel"
        ? (v.lengthMax>=999 ? `Body length ${v.lengthMin}+ cm` : `Body length ${v.lengthMin}–${v.lengthMax} cm`)
        : `Neck ${v.neckMin??"–"}–${v.neckMax??"–"} cm · Chest ${v.chestMin}–${v.chestMax} cm`,
    })),
  };
}

/* Aggregate a catalog product's variants into overall neck/chest/length ranges
   for the Fit Checker. Curated SKUs carry a precomputed `agg`; Odoo products are
   derived from each variant's parsed Dimension text (label-matched, so a
   Leash's "Length" is never mistaken for a Clothing item's body length). */
function aggregateDims(product){
  if(!product) return {neck:null,chest:null,length:null};
  if(product.agg) return product.agg;
  const neck=[], chest=[], length=[];
  (product.variants||[]).forEach(v=>{
    (v.dimParsed||[]).forEach(d=>{
      const lbl=(d.label||"").toLowerCase();
      const lo=d.value, hi=(d.valueMax!=null?d.valueMax:d.value);
      if(lbl.includes("neck")){ neck.push(lo); neck.push(hi); }
      else if(lbl.includes("girth")){ chest.push(lo); chest.push(hi); }
      else if(lbl==="length" && product.category==="Clothing"){ length.push(lo); length.push(hi); }
    });
  });
  return {
    neck: neck.length?[Math.min(...neck),Math.max(...neck)]:null,
    chest: chest.length?[Math.min(...chest),Math.max(...chest)]:null,
    length: length.length?[Math.min(...length),Math.max(...length)]:null,
  };
}

  const [f,setF]=useState(JSON.parse(JSON.stringify(sku)));
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

function AskTab({all}){
  const [msgs,setMsgs]=useState([{role:"bot",text:"Hi! I'm the HUFT Fit engine. Ask me anything about the "+all.length+" breeds in the database — sizes, fit, behaviour, regions, materials. I answer only from the portal's data, with confidence tiers attached."}]);
  const [input,setInput]=useState("");
  useEffect(()=>{ window.__ASK_PREFILL__=(q)=>{ setInput(q); setTimeout(()=>send(q),30); }; return ()=>{window.__ASK_PREFILL__=null;}; },[]);
  const send=(text)=>{
    const q=(text!==undefined?text:input).trim(); if(!q) return;
    const a=answerQuestion(q, all);
    setMsgs(m=>[...m,{role:"user",text:q},{role:"bot",text:a}]);
    setInput("");
    setTimeout(()=>{const el=document.getElementById("chat-end"); if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"});},60);
  };
  const chips=["Which breeds and sizes will the HUFT Xplorers Harness fit?","What size collar for a Beagle?","Harness for an Indie","Which breeds fit neck 35-50?","Top breeds in Delhi","Compare Labrador and Golden Retriever","Strongest pullers","Native breeds"];
  const render=(t)=>t.split("\n").map((ln,i)=>{
    const parts=ln.split("**");
    return <div key={i} style={{minHeight:ln?undefined:8}}>{parts.map((p,j)=>j%2===1?<b key={j}>{p}</b>:<span key={j}>{p}</span>)}</div>;
  });
  return (
    <React.Fragment>
      <section style={{background:"#fff",borderRadius:8,border:"1px solid #E6E9EF",padding:16,marginBottom:12}}>
        <div style={{maxHeight:420,overflowY:"auto",display:"grid",gap:10}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{justifySelf:m.role==="user"?"end":"start",maxWidth:"88%",background:m.role==="user"?"#FF6D1F":"#F5F6F8",color:m.role==="user"?"#fff":"#323338",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 14px",fontSize:13.5,lineHeight:1.55,overflowWrap:"break-word"}}>
              {render(m.text)}
            </div>
          ))}
          <div id="chat-end"/>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder="Ask about any breed, size, region…"
            style={{flex:1,padding:"11px 16px",borderRadius:999,border:"1.5px solid #E6E9EF",fontSize:14,fontFamily:"inherit",background:"#F6F7FB"}}/>
          <button onClick={()=>send()} style={{background:"#FF6D1F",color:"#fff",border:"none",borderRadius:999,padding:"11px 20px",fontWeight:600,fontSize:13.5,cursor:"pointer",fontFamily:"inherit"}}>Ask</button>
        </div>
      </section>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {chips.map(c=><button key={c} onClick={()=>send(c)} style={{padding:"6px 13px",borderRadius:999,border:"1.5px solid #E6E9EF",background:"#fff",color:"#676879",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{c}</button>)}
      </div>
      <p style={{fontSize:11.5,color:"#9699A6",lineHeight:1.55}}>This engine is rule-based and answers strictly from the portal's breed database — it runs fully in the browser at zero API cost. It can later be upgraded to Claude via a small serverless function (keeps the API key off the client); the data layer stays the same.</p>
    </React.Fragment>
  );
}

function AddBreedForm({existingNames,onAdd,onClose}){
  const [f,setF]=useState({name:"",group:"Medium",wLo:10,wHi:20,hLo:40,hHi:55,nLo:30,nHi:45,cLo:50,cHi:70,coat:"Short",pop:3,heat:3,pull:3,energy:3,escape:2,clip:"Back-clip harness",rn:3,rw:3,rs:3,re:3,confTier:"C",flags:[],notes:"",src:""});
  const [err,setErr]=useState("");
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleFlag=fl=>set("flags",f.flags.includes(fl)?f.flags.filter(x=>x!==fl):[...f.flags,fl]);
  const inp={...{fontFamily:"'IBM Plex Mono', ui-monospace, monospace"},fontSize:14,fontWeight:600,padding:"7px 8px",borderRadius:7,border:"1.5px solid #C3C6D4",width:"100%",boxSizing:"border-box"};
  const lbl={fontSize:10.5,letterSpacing:"0.05em",textTransform:"uppercase",color:"#676879",fontWeight:600,display:"block",marginBottom:3};
  const sel={padding:"7px 8px",borderRadius:7,border:"1.5px solid #C3C6D4",fontSize:13,fontFamily:"inherit",width:"100%",boxSizing:"border-box",background:"#fff"};
  const Pair=({label,lo,hi,unit})=>(
    <div style={{flex:1,minWidth:130}}>
      <span style={lbl}>{label} ({unit})</span>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <input type="number" inputMode="decimal" step="0.5" value={f[lo]} onChange={e=>set(lo,Number(e.target.value))} style={inp}/>
        <span style={{color:"#9699A6"}}>–</span>
        <input type="number" inputMode="decimal" step="0.5" value={f[hi]} onChange={e=>set(hi,Number(e.target.value))} style={inp}/>
      </div>
    </div>);
  const Rate=({label,k,max=5,min=0})=>(
    <div style={{flex:1,minWidth:90}}>
      <span style={lbl}>{label}</span>
      <select value={f[k]} onChange={e=>set(k,Number(e.target.value))} style={sel}>
        {Array.from({length:max-min+1},(_,i)=>min+i).map(v=><option key={v} value={v}>{v}</option>)}
      </select>
    </div>);
  const submit=()=>{
    const name=f.name.trim();
    if(!name) return setErr("Breed name is required.");
    if(existingNames.some(n=>n.toLowerCase()===name.toLowerCase())) return setErr(`"${name}" already exists in the database.`);
    for(const [lo,hi,l] of [["wLo","wHi","Weight"],["hLo","hHi","Height"],["nLo","nHi","Neck"],["cLo","cHi","Chest"]])
      if(!(f[hi]>f[lo])) return setErr(`${l}: max must be greater than min.`);
    onAdd({
      name, group:f.group, weight:[f.wLo,f.wHi], height:[f.hLo,f.hHi], neck:[f.nLo,f.nHi], chest:[f.cLo,f.cHi],
      coat:f.coat, flags:f.flags, pop:f.pop, growth:"Team-entered — verify growth curve",
      regions:{n:f.rn,w:f.rw,s:f.rs,e:f.re}, heat:f.heat,
      conf:{neck:f.confTier,chest:f.confTier,wt:f.confTier,ht:f.confTier},
      src:[f.src.trim()||"Team-entered — source not specified", "Added via portal on "+new Date().toISOString().slice(0,10)],
      beh:{pull:f.pull,energy:f.energy,escape:f.escape,clip:f.clip.trim()||"Back-clip harness"},
      notes:f.notes.trim()||"Team-added breed — pending fit-lab validation.", custom:true,
      care:{life:[9,14],shed:3,groom:2,drool:1,skin:2,train:3,bodyLen:[Math.round(f.hLo*1.02),Math.round(f.hHi*1.1)]},
    });
  };
  return (
    <section style={{background:"#fff",borderRadius:8,border:"1.5px solid #323338",padding:16,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{margin:0,fontSize:15}}>Add a breed</h3>
        <button onClick={onClose} style={{border:"1px solid #E6E9EF",background:"#fff",borderRadius:7,padding:"4px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit",color:"#676879"}}>Cancel</button>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        <div style={{flex:2,minWidth:180}}><span style={lbl}>Breed name</span><input value={f.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Golden Indie mix" style={{...inp,fontFamily:"inherit",fontWeight:500}}/></div>
        <div style={{flex:1,minWidth:110}}><span style={lbl}>Group</span><select value={f.group} onChange={e=>set("group",e.target.value)} style={sel}>{GROUPS.filter(g=>g!=="All").map(g=><option key={g}>{g}</option>)}</select></div>
        <div style={{flex:1,minWidth:110}}><span style={lbl}>Coat</span><input value={f.coat} onChange={e=>set("coat",e.target.value)} style={{...inp,fontFamily:"inherit",fontWeight:500}}/></div>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        {Pair({label:"Neck girth",lo:"nLo",hi:"nHi",unit:"cm"})}
        {Pair({label:"Chest girth",lo:"cLo",hi:"cHi",unit:"cm"})}
        {Pair({label:"Weight",lo:"wLo",hi:"wHi",unit:"kg"})}
        {Pair({label:"Height",lo:"hLo",hi:"hHi",unit:"cm"})}
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        <div style={{flex:1,minWidth:160}}>
          <span style={lbl}>How sure is this data?</span>
          <select value={f.confTier} onChange={e=>set("confTier",e.target.value)} style={sel}>
            <option value="A">A — measured (fit lab / study)</option>
            <option value="B">B — from sizing charts</option>
            <option value="C">C — estimate, needs validation</option>
          </select>
        </div>
        {Rate({label:"India demand",k:"pop",min:1})}
        {Rate({label:"Heat tolerance",k:"heat",min:1})}
      </div>
      <span style={lbl}>Zone demand (HUFT regions)</span>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        {Rate({label:"North",k:"rn"})}{Rate({label:"West",k:"rw"})}{Rate({label:"South",k:"rs"})}{Rate({label:"East",k:"re"})}
      </div>
      <span style={lbl}>Behaviour (leash / harness)</span>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        {Rate({label:"Pull force",k:"pull",min:1})}{Rate({label:"Energy",k:"energy",min:1})}{Rate({label:"Escape risk",k:"escape",min:1})}
        <div style={{flex:2,minWidth:170}}><span style={lbl}>Recommended clip / gear</span><input value={f.clip} onChange={e=>set("clip",e.target.value)} style={{...inp,fontFamily:"inherit",fontWeight:500}}/></div>
      </div>
      <span style={lbl}>Build flags</span>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
        {Object.entries(FLAG_LABELS).map(([k,v])=>(
          <button key={k} onClick={()=>toggleFlag(k)} title={v.tip} style={{padding:"4px 10px",borderRadius:999,fontSize:11.5,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:f.flags.includes(k)?"1.5px solid #BA4511":"1.5px solid #E6E9EF",background:f.flags.includes(k)?"#FEF1E5":"#fff",color:f.flags.includes(k)?"#BA4511":"#9699A6"}}>{v.label}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        <div style={{flex:1,minWidth:200}}><span style={lbl}>Source of the numbers</span><input value={f.src} onChange={e=>set("src",e.target.value)} placeholder="e.g. Fit lab session 12 Jun · 6 dogs measured" style={{...inp,fontFamily:"inherit",fontWeight:500}}/></div>
        <div style={{flex:2,minWidth:200}}><span style={lbl}>Fit notes</span><input value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Anything the apparel team should know" style={{...inp,fontFamily:"inherit",fontWeight:500}}/></div>
      </div>
      {err && <p style={{color:"#E2445C",fontSize:13,margin:"0 0 8px"}}>{err}</p>}
      <button onClick={submit} style={{background:"#FF6D1F",color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",fontSize:13.5,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Add breed</button>
    </section>
  );
}

      </form>
    </div>
  );
}

function AuthGate(){

}

  const [feedback,setFeedback]=useState(()=>store.get(KEY_FEEDBACK,[]));
  const [customBreeds,setCustomBreeds]=useState(()=>store.get(KEY_CUSTOM,[]));
  const [skus,setSkus]=useState(()=>{ const saved=store.get(KEY_SKUS,null); return saved&&saved.length?saved:SEED_SKUS; });
  useEffect(()=>{ window.__HUFT_SKUS__=skus; },[skus]);
  const persistSkus=l=>{setSkus(l); store.set(KEY_SKUS,l);};
  const [customProducts,setCustomProducts]=useState(()=>store.get(KEY_CUSTOM_PRODUCTS,[]));
  const addCustomProduct=p=>{const l=[...customProducts,p]; setCustomProducts(l); store.set(KEY_CUSTOM_PRODUCTS,l);};
  const removeCustomProduct=name=>{const l=customProducts.filter(p=>p.name!==name); setCustomProducts(l); store.set(KEY_CUSTOM_PRODUCTS,l);};
  const curatedProducts=useMemo(()=>skus.map(curatedSkuToProduct),[skus]);
  const odooProducts=(typeof PRODUCT_CATALOG!=="undefined")?PRODUCT_CATALOG:[];
  const fullCatalog=useMemo(()=>[...curatedProducts,...odooProducts,...customProducts],[curatedProducts,customProducts]);
  const [showAddBreed,setShowAddBreed]=useState(false);
  const ALL=useMemo(()=>[...BREEDS,...customBreeds],[customBreeds]);
  const [toast,setToast]=useState("");
  const say=m=>{setToast(m);setTimeout(()=>setToast(""),2500);};

  const persistProducts=l=>{setSaved(l); if(!store.set(KEY_PRODUCTS,l)) say("Storage unavailable — export before closing");};
  const addFeedback=f=>{const l=[...feedback,f]; setFeedback(l); if(store.set(KEY_FEEDBACK,l)) say("Feedback saved — thank you"); else say("Storage unavailable");};
  const addCustomBreed=b=>{const l=[...customBreeds,b]; setCustomBreeds(l); if(store.set(KEY_CUSTOM,l)) say(`"${b.name}" added to database`); else say("Storage unavailable — export before closing"); setShowAddBreed(false);};
  const removeCustomBreed=name=>{ if(!window.confirm(`Remove custom breed "${name}"? This cannot be undone.`)) return; const l=customBreeds.filter(b=>b.name!==name); setCustomBreeds(l); store.set(KEY_CUSTOM,l); say(`Removed "${name}"`);};

  const fitCatOptions = useMemo(()=>["All",...Array.from(new Set(fullCatalog.map(p=>p.category))).sort()],[fullCatalog]);
  const fitSubOptions = useMemo(()=>["All",...Array.from(new Set(fullCatalog.filter(p=>fitCat==="All"||p.category===fitCat).map(p=>p.subCategory))).sort()],[fullCatalog,fitCat]);
  const fitProductOptions = useMemo(()=>fullCatalog.filter(p=>(fitCat==="All"||p.category===fitCat)&&(fitSub==="All"||p.subCategory===fitSub)),[fullCatalog,fitCat,fitSub]);
  const applyProduct=(name)=>{
    setFitProductName(name);
    if(!name){ setFitNote(""); return; }
    const p=fullCatalog.find(x=>x.name===name);
    if(!p){ setFitNote(""); return; }
    const agg=aggregateDims(p);
    if(agg.length){
      setPtype("apparel"); setLengthMin(agg.length[0]); setLengthMax(agg.length[1]);
      setFitNote(`Loaded body-length range ${agg.length[0]}–${agg.length[1]} cm across ${p.variants.length} size${p.variants.length>1?"s":""} of "${name}".`);
    } else if(agg.chest){
      setPtype("harness"); if(agg.neck){setNeckMin(agg.neck[0]);setNeckMax(agg.neck[1]);} setChestMin(agg.chest[0]); setChestMax(agg.chest[1]);
      setFitNote(`Loaded neck & chest range across ${p.variants.length} size${p.variants.length>1?"s":""} of "${name}".`);
    } else if(agg.neck){
      setPtype("collar"); setNeckMin(agg.neck[0]); setNeckMax(agg.neck[1]);
      setFitNote(`Loaded neck range across ${p.variants.length} size${p.variants.length>1?"s":""} of "${name}".`);
    } else {
      setFitNote(`"${name}" doesn't have structured neck/chest/length measurements to auto-fill — enter dimensions manually below.`);
    }
  };

  const validDims = ptype==="apparel" ? (lengthMin!==""&&lengthMax!==""&&lengthMax>lengthMin)
    : ptype==="collar" ? (neckMin!==""&&neckMax!==""&&neckMax>neckMin)
    : (neckMin!==""&&neckMax!==""&&chestMin!==""&&chestMax!==""&&neckMax>neckMin&&chestMax>chestMin);

  const results=useMemo(()=>{ if(!validDims) return [];
    const pool = regionFocus==="all" ? ALL : ALL.filter(b=>b.regions[regionFocus]>0);
    const demand = b => regionFocus==="all" ? b.pop : b.regions[regionFocus];
    if(ptype==="apparel"){
      return pool.map(b=>{ const bodyLen=(b.care&&b.care.bodyLen)||b.height;
        const lPct=overlapPct(bodyLen,[lengthMin,lengthMax]);
        return {breed:b,nPct:lPct,cPct:1,combined:lPct,grade:gradeOf(lPct),demand:demand(b)};
      }).sort((a,z)=>z.combined-a.combined||z.demand-a.demand);
    }
    return pool.map(b=>{ const nPct=overlapPct(b.neck,[neckMin,neckMax]);
      const cPct=ptype==="harness"?overlapPct(b.chest,[chestMin,chestMax]):1;
      const combined=ptype==="harness"?Math.min(nPct,cPct):nPct;
      return {breed:b,nPct,cPct,combined,grade:gradeOf(combined),demand:demand(b)};
    }).sort((a,z)=>z.combined-a.combined||z.demand-a.demand);
  },[ptype,neckMin,neckMax,chestMin,chestMax,lengthMin,lengthMax,validDims,regionFocus]);

  const counts=useMemo(()=>{const c={full:0,good:0,partial:0,none:0};results.forEach(r=>c[r.grade]++);return c;},[results]);

  const saveProduct=()=>{ if(!validDims) return;
    const p={id:Date.now(),name:pname.trim()||`${ptype==="collar"?"Collar":"Harness"} ${saved.length+1}`,type:ptype,neck:[neckMin,neckMax],chest:ptype==="harness"?[chestMin,chestMax]:null,width};
    persistProducts([...saved,p]); say(`Saved "${p.name}" to line coverage`);
  };
  const removeProduct=id=>persistProducts(saved.filter(p=>p.id!==id));

  const exportJSON=(data,fname)=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fname; a.click(); URL.revokeObjectURL(a.href);
  };

  const filteredBreeds=ALL.filter(b=>(grp==="All"||b.group===grp)&&(readyFilter==="All"||(b.indiaReady||{}).status===readyFilter)&&b.name.toLowerCase().includes(query.toLowerCase()));
  const searchResults=query.trim()?ALL.filter(b=>b.name.toLowerCase().includes(query.toLowerCase())):[];

  const coverage=useMemo(()=>ALL.map(b=>{
    let best={grade:"none",pct:0,via:null};
    saved.forEach(p=>{ const nPct=overlapPct(b.neck,p.neck);
      const cPct=p.type==="harness"&&p.chest?overlapPct(b.chest,p.chest):1;
      const combined=p.type==="harness"?Math.min(nPct,cPct):nPct;
      if(combined>best.pct) best={grade:gradeOf(combined),pct:combined,via:p.name};
    });
    return {breed:b,...best};
  }).sort((a,z)=>a.pct-z.pct),[saved,ALL]);
  const gaps=coverage.filter(c=>c.grade==="none"||c.grade==="partial");

  const NAVITEMS=[["home","⌂","Home"],["fit","⚖","Fit checker"],["catalog","📚","HUFT Catalog"],["library","📖","Knowledge base"],["feedback","📝","Feedback"]];
  const card={background:"#fff",borderRadius:8,border:"1px solid #E6E9EF",padding:16,marginBottom:12};

  return (
    <div className="app-shell" style={{background:"#F6F7FB",color:"#323338",fontFamily:"'Rubik', -apple-system, 'Segoe UI', sans-serif"}}>
      {/* monday-style left sidebar */}
      <aside className="side">
        <div onClick={()=>setTab("home")} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:9,flexShrink:0}}>
          <div style={{background:"#FF6D1F",color:"#fff",borderRadius:8,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15}}>H</div>
          <div><div style={{fontWeight:700,fontSize:14.5,lineHeight:1.1,color:"#222222"}}>HUFT</div><div style={{fontSize:10.5,color:"#676879",letterSpacing:"0.08em"}}>FIT FINDER</div></div>
        </div>
        <div className="navlist">
          {NAVITEMS.map(([k,ic,l])=>{
            const badge = k==="feedback"?feedback.length : 0;
            return (
            <button key={k} onClick={()=>setTab(k)} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13.5,fontWeight:tab===k?600:500,fontFamily:"inherit",whiteSpace:"nowrap",textAlign:"left",background:tab===k?"#FEF1E5":"transparent",color:tab===k?"#BA4511":"#40434E",boxShadow:tab===k?"inset 3px 0 0 #FF6D1F":"none"}}>
              <span style={{fontSize:15,width:20,textAlign:"center"}}>{ic}</span>{l}
              {badge>0 && <span style={{marginLeft:"auto",background:tab===k?"#FF6D1F":"#E6E9EF",color:tab===k?"#fff":"#676879",borderRadius:999,fontSize:10.5,fontWeight:700,padding:"1px 7px"}}>{badge}</span>}
            </button>);
          })}
        </div>
        <div className="sidestats" style={{borderTop:"1px solid #EAECF2",paddingTop:10,fontSize:11,color:"#9699A6",lineHeight:1.7}}>
          {ALL.length} breeds · all cm<br/>{customBreeds.length} team-added<br/>v5.0 · real sales data
          {onLogout && <button onClick={onLogout} style={{marginTop:8,border:"1px solid #E6E9EF",background:"#fff",color:"#676879",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit",width:"100%"}}>Log out</button>}
        </div>
      </aside>

      <div className="mainarea">
      {/* topbar with global search */}
      <div style={{background:"#fff",borderBottom:"1px solid #E6E9EF",padding:"10px 16px",position:"sticky",top:0,zIndex:30}}>
        <div style={{maxWidth:960,margin:"0 auto",position:"relative"}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder={`Search ${ALL.length} breeds — Indie, Labrador, Mudhol…`}
            style={{width:"100%",boxSizing:"border-box",padding:"10px 16px",borderRadius:8,border:"1.5px solid #E6E9EF",fontSize:14,fontFamily:"inherit",background:"#F6F7FB",color:"#323338"}}/>
          {query.trim() && tab!=="library" && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",borderRadius:8,marginTop:6,boxShadow:"0 10px 30px rgba(50,51,56,0.18)",border:"1px solid #E6E9EF",zIndex:40,overflow:"hidden"}}>
              {searchResults.slice(0,6).map(b=>(
                <button key={b.name} onClick={()=>{setTab("library");setGrp("All");}} style={{display:"flex",justifyContent:"space-between",gap:8,width:"100%",padding:"10px 14px",border:"none",borderBottom:"1px solid #EAECF2",background:"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:13.5,color:"#323338",textAlign:"left"}}>
                  <b>{b.name}</b><span style={{...MONO,fontSize:11.5,color:"#9699A6"}}>neck {b.neck[0]}–{b.neck[1]} · chest {b.chest[0]}–{b.chest[1]}</span>
                </button>
              ))}
              {searchResults.length===0 && <div style={{padding:"10px 14px",fontSize:13,color:"#9699A6"}}>No breed matches "{query}"</div>}
            </div>
          )}
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:"16px 16px 60px"}}>
        {toast && <div style={{position:"fixed",bottom:18,left:"50%",transform:"translateX(-50%)",background:"#323338",color:"#fff",padding:"10px 16px",borderRadius:999,fontSize:13,zIndex:50}}>{toast}</div>}

        {/* ===== HOME ===== */}
        {tab==="home" && <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(150px, 1fr))",gap:10,marginBottom:12}}>
            {[["fit","📏","Check a fit","Enter product dimensions, see which breeds it serves"],["catalog","📚","HUFT Catalog","Browse all products, add new ones"],["library","📖","Knowledge base","All measurements, care & behaviour data per breed"]].map(([k,ic,t,d])=>(
              <button key={k} onClick={()=>setTab(k)} style={{textAlign:"left",background:"#fff",border:"1.5px solid #E6E9EF",borderRadius:8,padding:"16px 14px",cursor:"pointer",fontFamily:"inherit"}}>
                <div style={{fontSize:26}}>{ic}</div>
                <div style={{fontWeight:700,fontSize:14.5,color:"#323338",margin:"6px 0 3px"}}>{t}</div>
                <div style={{fontSize:12,color:"#676879",lineHeight:1.45}}>{d}</div>
              </button>
            ))}
          </div>
          <section style={card}>
            <h3 style={{margin:"0 0 4px",fontSize:14.5}}>HUFT priority breeds</h3>
            <p style={{fontSize:12,color:"#676879",margin:"0 0 10px"}}>The six breeds with dedicated HUFT shop-by-breed pages — check these first on any new product.</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {ALL.filter(b=>b.huft).map(b=>(
                <button key={b.name} onClick={()=>{setQuery(b.name);setTab("library");}} style={{padding:"7px 14px",borderRadius:999,border:"1.5px solid #FF6D1F",background:"#fff",color:"#FF6D1F",fontWeight:600,fontSize:12.5,cursor:"pointer",fontFamily:"inherit"}}>{b.name}</button>
              ))}
            </div>
          </section>
        </>}


        {/* ===== FIT CHECKER ===== */}
        {tab==="fit" && <>
          <section style={card}>
            <h3 style={{margin:"0 0 4px",fontSize:14.5}}>Pick a product from the catalog</h3>
            <p style={{fontSize:12,color:"#676879",margin:"0 0 10px"}}>Choose a category, sub-category and product — dimensions load automatically from {fullCatalog.length.toLocaleString()} products in the HUFT Catalog. Or leave it on manual entry and type dimensions directly below.</p>
            <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
              <select value={fitCat} onChange={e=>{setFitCat(e.target.value);setFitSub("All");setFitProductName("");setFitNote("");}} style={{padding:"9px 10px",borderRadius:8,border:"1.5px solid #C3C6D4",fontSize:13,fontFamily:"inherit",background:"#fff"}}>
                {fitCatOptions.map(c=><option key={c} value={c}>{c==="All"?"All categories":c}</option>)}
              </select>
              <select value={fitSub} onChange={e=>{setFitSub(e.target.value);setFitProductName("");setFitNote("");}} style={{padding:"9px 10px",borderRadius:8,border:"1.5px solid #C3C6D4",fontSize:13,fontFamily:"inherit",background:"#fff"}}>
                {fitSubOptions.map(s=><option key={s} value={s}>{s==="All"?"All sub-categories":s}</option>)}
              </select>
              <select value={fitProductName} onChange={e=>applyProduct(e.target.value)} style={{flex:1,minWidth:200,padding:"9px 10px",borderRadius:8,border:"1.5px solid #C3C6D4",fontSize:13,fontFamily:"inherit",background:"#fff"}}>
                <option value="">— Manual entry (no product selected) —</option>
                {fitProductOptions.slice(0,500).map(p=><option key={p.name} value={p.name}>{p.name}</option>)}
              </select>
            </div>
            {fitNote && <p style={{fontSize:12,color:"#565A6E",background:"#F0F1F6",borderRadius:7,padding:"7px 10px",margin:"0 0 10px"}}>{fitNote}</p>}
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              {["harness","collar","apparel"].map(t=>(
                <button key={t} onClick={()=>setPtype(t)} style={{padding:"8px 18px",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:14,fontFamily:"inherit",border:ptype===t?"1.5px solid #323338":"1.5px solid #C3C6D4",background:ptype===t?"#323338":"#fff",color:ptype===t?"#F6C445":"#676879"}}>{t==="harness"?"Harness":t==="collar"?"Collar":"Apparel"}</button>
              ))}
              <select value={regionFocus} onChange={e=>setRegionFocus(e.target.value)} title="Rank results by regional demand" style={{padding:"9px 10px",borderRadius:8,border:"1.5px solid #C3C6D4",fontSize:13,fontFamily:"inherit",background:"#fff",color:regionFocus==="all"?"#676879":"#323338",fontWeight:600}}>
                <option value="all">All India</option>
                {Object.values(REGIONS).map(r=><option key={r.key} value={r.key}>{r.label} zone</option>)}
              </select>
            </div>
            {regionFocus!=="all" && <p style={{fontSize:12,color:"#676879",margin:"0 0 10px"}}>Ranking by demand in <b>{REGIONS[regionFocus].label}</b> ({REGIONS[regionFocus].cities}); breeds with zero regional presence hidden.</p>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {ptype==="apparel" ? <>
                <NumBox label="Body length min (cm)" value={lengthMin} onChange={setLengthMin}/>
                <NumBox label="Body length max (cm)" value={lengthMax} onChange={setLengthMax}/>
              </> : <>
                <NumBox label="Neck min (cm)" value={neckMin} onChange={setNeckMin}/>
                <NumBox label="Neck max (cm)" value={neckMax} onChange={setNeckMax}/>
                {ptype==="harness" && <>
                  <NumBox label="Chest min (cm)" value={chestMin} onChange={setChestMin}/>
                  <NumBox label="Chest max (cm)" value={chestMax} onChange={setChestMax}/>
                </>}
                <NumBox label="Webbing width (cm)" value={width} onChange={setWidth} min={0.5} max={8}/>
              </>}
            </div>
            {!validDims && <p style={{color:"#E2445C",fontSize:13,margin:"10px 0 0"}}>Max must be greater than min for each dimension.</p>}
          </section>

          {validDims && <>
            <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
              {Object.entries(counts).map(([g,n])=>{
                const active=gradeFilter===g;
                return (
                <button key={g} onClick={()=>setGradeFilter(active?null:g)} style={{...MONO,flex:1,minWidth:70,textAlign:"center",background:GRADE[g].bg,color:GRADE[g].color,borderRadius:10,padding:"10px 6px",border:active?`2px solid ${GRADE[g].color}`:`1px solid ${GRADE[g].color}33`,cursor:"pointer",fontFamily:"'IBM Plex Mono', ui-monospace, monospace",opacity:gradeFilter&&!active?0.55:1,transition:"opacity 0.15s"}}>
                  <div style={{fontSize:22,fontWeight:600}}>{n}</div><div style={{fontSize:11}}>{GRADE[g].label}</div>
                </button>);
              })}
            </div>
            {gradeFilter && <p style={{fontSize:12,color:"#676879",margin:"0 0 10px"}}>Showing <b style={{color:GRADE[gradeFilter].color}}>{GRADE[gradeFilter].label}</b> breeds only ({counts[gradeFilter]}) — <span style={{textDecoration:"underline",cursor:"pointer"}} onClick={()=>setGradeFilter(null)}>clear filter</span>.</p>}
            <div style={{display:"flex",gap:14,alignItems:"center",flexWrap:"wrap",fontSize:11,color:"#676879",marginBottom:12}}>
              <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:10,borderRadius:3,background:"#E6E9F5",border:"1.5px dashed #9699A6",display:"inline-block"}}/>Breed range</span>
              <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:10,borderRadius:3,background:"#FFC299",display:"inline-block"}}/>Your product</span>
              <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:14,height:10,borderRadius:3,background:"#00A25B",display:"inline-block"}}/>Overlap</span>
            </div>
            {results.filter(r=>!gradeFilter||r.grade===gradeFilter).map(({breed:b,nPct,cPct,grade,demand})=>{
              const worstConf = ptype==="apparel" ? "B" : ptype==="harness" ? ([b.conf.neck,b.conf.chest].includes("C")?"C":[b.conf.neck,b.conf.chest].includes("B")?"B":"A") : b.conf.neck;
              const bodyLen=(b.care&&b.care.bodyLen)||b.height;
              return (
              <div key={b.name} style={{...card,padding:"13px 14px",opacity:grade==="none"?0.62:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <div style={{fontWeight:700,fontSize:15}}>{b.name} <span style={{fontWeight:400,fontSize:12,color:"#9699A6"}}>· {b.group} · {regionFocus==="all"?"★".repeat(b.pop):`${REGIONS[regionFocus].label} ${"★".repeat(demand)}`}</span> <ConfBadge tier={worstConf}/></div>
                  <span style={{fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:999,background:GRADE[grade].bg,color:GRADE[grade].color}}>{GRADE[grade].label}</span>
                </div>
                <div style={{marginTop:10,display:"grid",gap:8}}>
                  {ptype==="apparel" ? (
                    <div>
                      <div style={{...MONO,fontSize:11,color:"#676879",marginBottom:3,display:"flex",justifyContent:"space-between"}}><span>BODY LENGTH · breed {bodyLen[0]}–{bodyLen[1]} cm <span title="Estimated from height/build" style={{cursor:"help"}}>est.</span></span><span>{Math.round(nPct*100)}% covered</span></div>
                      <TapeBar breedRange={bodyLen} prodRange={[lengthMin,lengthMax]} domain={[15,100]}/>
                    </div>
                  ) : <>
                  <div>
                    <div style={{...MONO,fontSize:11,color:"#676879",marginBottom:3,display:"flex",justifyContent:"space-between"}}><span>NECK · breed {b.neck[0]}–{b.neck[1]} cm <ConfBadge tier={b.conf.neck}/></span><span>{Math.round(nPct*100)}% covered</span></div>
                    <TapeBar breedRange={b.neck} prodRange={[neckMin,neckMax]} domain={[15,90]}/>
                  </div>
                  {ptype==="harness" && (
                    <div>
                      <div style={{...MONO,fontSize:11,color:"#676879",marginBottom:3,display:"flex",justifyContent:"space-between"}}><span>CHEST · breed {b.chest[0]}–{b.chest[1]} cm <ConfBadge tier={b.conf.chest}/></span><span>{Math.round(cPct*100)}% covered</span></div>
                      <TapeBar breedRange={b.chest} prodRange={[chestMin,chestMax]} domain={[25,115]}/>
                    </div>
                  )}
                  </>}
                </div>
                {grade!=="none" && (
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:9,alignItems:"center"}}>
                    <Chip text={`Pull ${b.beh.pull}/5`} tip={pullHardware(b.beh.pull)} tone={b.beh.pull>=4?"warn":"info"}/>
                    <Chip text={`Escape ${b.beh.escape}/5`} tip={b.beh.clip} tone={b.beh.escape>=4?"warn":"info"}/>
                    {b.flags.map(f=><Chip key={f} text={FLAG_LABELS[f].label} tip={FLAG_LABELS[f].tip} tone="warn"/>)}
                    {ptype!=="apparel" && <Chip text={widthAdvice(b.neck[1])} tone="info"/>}
                    {ptype==="collar" && b.flags.includes("brachy") && <Chip text="⚠ Recommend harness for walking" tone="warn"/>}
                    {ptype==="collar" && b.flags.includes("slipRisk") && <Chip text="⚠ Martingale advised" tone="warn"/>}
                  </div>
                )}
              </div>);
            })}
          </>}
        </>}

        {/* ===== BREED LIBRARY ===== */}
        {tab==="library" && <>
          <section style={card}>
            <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2,alignItems:"center"}}>
              <button onClick={()=>setShowAddBreed(!showAddBreed)} style={{padding:"5px 14px",borderRadius:999,fontSize:12.5,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",border:"1.5px solid #FF6D1F",background:showAddBreed?"#FF6D1F":"#fff",color:showAddBreed?"#fff":"#FF6D1F"}}>+ Add breed</button>
              {GROUPS.map(g=>(
                <button key={g} onClick={()=>setGrp(g)} style={{padding:"5px 12px",borderRadius:999,fontSize:12.5,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",border:grp===g?"1.5px solid #323338":"1.5px solid #E6E9EF",background:grp===g?"#323338":"#fff",color:grp===g?"#F6C445":"#676879"}}>{g}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:6,overflowX:"auto",paddingTop:8,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#9699A6",textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600,whiteSpace:"nowrap"}}>Indian readiness:</span>
              {READY_FILTERS.map(rf=>(
                <button key={rf} onClick={()=>setReadyFilter(rf)} style={{padding:"4px 11px",borderRadius:999,fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",border:readyFilter===rf?`1.5px solid ${rf==="All"?"#323338":READY_STYLE[rf].bd}`:"1.5px solid #E6E9EF",background:readyFilter===rf?(rf==="All"?"#323338":READY_STYLE[rf].bg):"#fff",color:readyFilter===rf?(rf==="All"?"#F6C445":READY_STYLE[rf].color):"#676879"}}>{rf}</button>
              ))}
              <span style={{fontSize:11.5,color:"#9699A6"}}>{ALL.filter(b=>(b.indiaReady||{}).status==="India-ready").length} India-ready · {ALL.filter(b=>(b.indiaReady||{}).status==="Provisional").length} provisional</span>
            </div>
            {query.trim() && <div style={{fontSize:12,color:"#676879",marginTop:8}}>Filtering by search: "{query}" — clear the top bar to see all.</div>}
          </section>
          {showAddBreed && <AddBreedForm existingNames={ALL.map(b=>b.name)} onAdd={addCustomBreed} onClose={()=>setShowAddBreed(false)}/>}
          {filteredBreeds.map(b=><BreedCard key={b.name} b={b} feedback={feedback} onAddFeedback={addFeedback} onDelete={b.custom?removeCustomBreed:null} defaultOpen={filteredBreeds.length===1}/>)}
          {filteredBreeds.length===0 && <p style={{textAlign:"center",color:"#9699A6"}}>No breeds match — clear the search or pick another group.</p>}
        </>}

        {/* ===== HUFT CATALOG (Odoo export + curated fit-matched SKUs + team additions) ===== */}
        {tab==="catalog" && <CatalogTab catalog={fullCatalog} odooCount={odooProducts.length} curatedCount={curatedProducts.length} customCount={customProducts.length}
          onAddProduct={addCustomProduct} onRemoveProduct={removeCustomProduct}
          onAsk={(name)=>{setAskOpen(true);setTimeout(()=>{window.__ASK_PREFILL__&&window.__ASK_PREFILL__(`Which breeds and sizes will the ${name} fit?`);},60);}}/>}

        {/* ===== FEEDBACK LOG ===== */}
        {tab==="feedback" && <>
          <section style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <h3 style={{margin:0,fontSize:15}}>Team feedback on breed data ({feedback.length})</h3>
              {feedback.length>0 && <button onClick={()=>exportJSON(feedback,"huft-fit-feedback.json")} style={{border:"1px solid #C3C6D4",background:"#fff",borderRadius:7,padding:"5px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:600,color:"#565A6E"}}>Export JSON</button>}
            </div>
            <p style={{fontSize:12.5,color:"#676879",margin:"6px 0 0"}}>Every rating submitted from the Knowledge base appears here. Export and share the JSON to consolidate team review — this is the pipeline for upgrading C-tier estimates to A-tier fit-lab data.</p>
          </section>
          {feedback.length===0 ? (
            <section style={{...card,textAlign:"center",padding:36}}>
              <div style={{fontSize:34}}>📝</div>
              <h3 style={{margin:"8px 0 4px"}}>No feedback yet</h3>
              <p style={{color:"#676879",fontSize:13.5,margin:0}}>Open any breed in the library and tap "Rate this data" to log whether the numbers match reality.</p>
            </section>
          ) : [...feedback].reverse().map(f=>(
            <div key={f.id} style={{...card,padding:"12px 14px",borderLeft:`4px solid ${f.verdict==="good"?"#00A25B":"#E2445C"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:8,flexWrap:"wrap",fontSize:13}}>
                <span><b>{f.breed}</b> · {f.field} · <span style={{color:f.verdict==="good"?"#00A25B":"#E2445C",fontWeight:700}}>{f.verdict==="good"?"✓ good":"✗ needs fix"}</span></span>
                <span style={{...MONO,fontSize:11.5,color:"#9699A6"}}>{f.author} · {f.ts.slice(0,16).replace("T"," ")}</span>
              </div>
              {f.text && <p style={{margin:"6px 0 0",fontSize:13,color:"#40434E"}}>{f.text}</p>}
            </div>
          ))}
        </>}

        <footer style={{marginTop:20,fontSize:11.5,color:"#9699A6",lineHeight:1.6}}>
          Confidence tiers — <b>A</b>: published standard or measured study (±2–3 cm) · <b>B</b>: aggregated manufacturer sizing charts (±4–6 cm) · <b>C</b>: estimated from build, pending HUFT fit-lab measurement (±8 cm+). Chest girths for 41 of 50 breeds are now B/A, cross-checked against AKC-standard girth bands (The Artful Canine); the remaining C-tier are mostly native breeds with no published girth data — only HUFT fit-lab measurement can raise these to A. Indian lines often run heavier than international standards. Hover any A/B/C badge for what it means. Data is stored in this browser (localStorage); export JSON to consolidate. â = demand rank from HUFT’s actual 2-year retail sales (393k+ units). Product sizes come from your catalog; ask the engine which breeds each SKU fits.
        </footer>
      </div>
      </div>
      <AskWidget open={askOpen} onToggle={()=>setAskOpen(o=>!o)} all={ALL}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate/>);

</script>
</body>
